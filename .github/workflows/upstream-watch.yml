name: Upstream watch

# Weekly detection only: have any of the upstream NuGet packages this repo republishes shipped a
# newer stable version than the baseline we last synced (.clast/upstream-baseline.json)?
# If so, open (or update) a single 'upstream-sync' tracking issue. The sync itself — merging
# `upstream`, resolving the Clast port conflicts, refreshing the baseline, and opening a PR — is
# performed by the Clast sync routine that reads this issue. See CLAST_SYNC.md.
#
# The same workflow file is used unchanged in every clast-project fork; only the baseline JSON differs.

on:
  schedule:
    - cron: '17 6 * * 1'   # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compare upstream NuGet versions to baseline
        id: check
        shell: bash
        run: |
          set -euo pipefail
          baseline=.clast/upstream-baseline.json
          : > behind.md
          while IFS=$'\t' read -r id base; do
            slug=$(echo "$id" | tr 'A-Z' 'a-z')
            latest=$(curl -s "https://api.nuget.org/v3-flatcontainer/$slug/index.json" \
              | jq -r '.versions[]?' \
              | grep -viE '(-|preview|beta|alpha|rc)$' \
              | sort -V | tail -1 || true)
            if [ -z "$latest" ]; then
              echo "::warning::no stable versions found for $id"
              continue
            fi
            newest=$(printf '%s\n%s\n' "$base" "$latest" | sort -V | tail -1)
            if [ "$latest" != "$base" ] && [ "$newest" = "$latest" ]; then
              echo "BEHIND  $id  $base -> $latest"
              printf -- '- `%s`: `%s` -> `%s`\n' "$id" "$base" "$latest" >> behind.md
            else
              echo "ok      $id  $base (latest $latest)"
            fi
          done < <(jq -r '.packages | to_entries[] | "\(.key)\t\(.value)"' "$baseline")

          if [ -s behind.md ]; then
            echo "behind=1" >> "$GITHUB_OUTPUT"
          else
            echo "All baselines current."
            echo "behind=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update the upstream-sync issue
        if: steps.check.outputs.behind == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          title="Upstream sync needed: newer upstream NuGet versions available"
          {
            echo "One or more upstream packages this repo republishes have shipped newer **stable** versions than our baseline (\`.clast/upstream-baseline.json\`):"
            echo
            cat behind.md
            echo
            echo "---"
            echo "The Clast sync routine will pick this up: fetch \`upstream\`, merge into a \`sync/upstream-*\` branch, resolve the Clast port conflicts (System.Text.Json swap, AOT, packaging flag), build with \`-p:Clast=true\` and run the tests, refresh the baseline to the versions above, and open a PR that closes this issue."
            echo
            echo "After the per-repo sync PRs are merged, publish by pushing a unified \`v*\` tag on \`google-api-dotnet-client\` (runs \`clast-publish.yml\`)."
            echo
            echo "_Generated by \`.github/workflows/upstream-watch.yml\`._"
          } > issue-body.md
          gh label create upstream-sync --color 1d76db \
            --description "Upstream has new stable releases to sync" 2>/dev/null || true
          existing=$(gh issue list --label upstream-sync --state open --json number --jq '.[0].number // empty' || true)
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --title "$title" --body-file issue-body.md
            echo "Updated issue #$existing"
          else
            gh issue create --title "$title" --body-file issue-body.md --label upstream-sync
          fi
